<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 12px;
    color: #a78bfa;
    text-transform: uppercase;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 14px;
    font-size: 1rem;
    color: #c4b5fd;
    letter-spacing: 1px;
  }
  #hud span { font-weight: 700; color: #fff; }
  canvas {
    border: 2px solid #3b3060;
    border-radius: 10px;
    display: block;
    background: #13101f;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay-title {
    font-size: 2.2rem;
    font-weight: 800;
    color: #f87171;
    letter-spacing: 3px;
  }
  #overlay-score {
    font-size: 1.1rem;
    color: #c4b5fd;
  }
  #overlay-score span { color: #fff; font-weight: 700; }
  #restart-btn {
    margin-top: 6px;
    padding: 12px 36px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    pointer-events: all;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
  }
  #restart-btn:hover { background: #6d28d9; transform: scale(1.04); }
  #restart-btn:active { transform: scale(0.97); }
  #hint {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #6b5fa0;
    letter-spacing: 1px;
  }
  #wrapper { position: relative; }
</style>
</head>
<body>

<h1>Dodge!</h1>
<div id="hud">
  Score: <span id="score-display">0</span>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  Best: <span id="best-display">0</span>
</div>

<div id="wrapper">
  <canvas id="canvas" width="480" height="520"></canvas>
  <div id="overlay">
    <div id="overlay-title">GAME OVER</div>
    <div id="overlay-score">Score: <span id="final-score">0</span></div>
    <button id="restart-btn">Play Again</button>
    <div id="hint">← → Arrow keys to move</div>
  </div>
</div>

<div id="hint" style="margin-top:12px; font-size:0.8rem; color:#4b4275; letter-spacing:1px;">Use ← → arrow keys to dodge</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay = document.getElementById('overlay');
const finalScore = document.getElementById('final-score');
const scoreDisplay = document.getElementById('score-display');
const bestDisplay = document.getElementById('best-display');
document.getElementById('restart-btn').addEventListener('click', startGame);

const PLAYER_R = 14;
const PLAYER_Y = H - 36;
const BLOCK_W = 28, BLOCK_H = 22;

let player, blocks, score, best, speed, spawnTimer, spawnInterval, gameOver, animId, keys;
best = 0;

function startGame() {
  player = { x: W / 2, vx: 0 };
  blocks = [];
  score = 0;
  speed = 2.2;
  spawnTimer = 0;
  spawnInterval = 72;
  gameOver = false;
  keys = {};
  overlay.classList.add('hidden');
  scoreDisplay.textContent = '0';
  cancelAnimationFrame(animId);
  loop();
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function spawnBlock() {
  const margin = BLOCK_W;
  const x = margin + Math.random() * (W - margin * 2 - BLOCK_W);
  blocks.push({ x, y: -BLOCK_H, w: BLOCK_W, h: BLOCK_H });
}

function update() {
  const ACCEL = 0.9, MAX_VX = 5.5, FRICTION = 0.78;

  if (keys['ArrowLeft'])  player.vx -= ACCEL;
  if (keys['ArrowRight']) player.vx += ACCEL;
  if (!keys['ArrowLeft'] && !keys['ArrowRight']) player.vx *= FRICTION;

  player.vx = Math.max(-MAX_VX, Math.min(MAX_VX, player.vx));
  player.x += player.vx;
  player.x = Math.max(PLAYER_R, Math.min(W - PLAYER_R, player.x));

  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnBlock();
    spawnTimer = 0;
    if (spawnInterval > 30) spawnInterval -= 0.4;
  }

  speed += 0.0012;

  for (let i = blocks.length - 1; i >= 0; i--) {
    blocks[i].y += speed;
    if (blocks[i].y > H + BLOCK_H) {
      blocks.splice(i, 1);
      score++;
      scoreDisplay.textContent = score;
      continue;
    }
    if (hitTest(player, blocks[i])) {
      endGame();
      return;
    }
  }
}

function hitTest(p, b) {
  const cx = Math.max(b.x, Math.min(p.x, b.x + b.w));
  const cy = Math.max(b.y, Math.min(PLAYER_Y, b.y + b.h));
  const dx = p.x - cx, dy = PLAYER_Y - cy;
  return dx * dx + dy * dy < (PLAYER_R - 2) * (PLAYER_R - 2);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = '#1e1a30';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  for (const b of blocks) {
    const grd = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grd.addColorStop(0, '#ff4d4d');
    grd.addColorStop(1, '#c00000');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.strokeStyle = '#ff8080';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  const pgrd = ctx.createRadialGradient(player.x, PLAYER_Y, 2, player.x, PLAYER_Y, PLAYER_R);
  pgrd.addColorStop(0, '#c4b5fd');
  pgrd.addColorStop(0.6, '#7c3aed');
  pgrd.addColorStop(1, '#4c1d95');
  ctx.fillStyle = pgrd;
  ctx.shadowColor = '#7c3aed';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.arc(player.x, PLAYER_Y, PLAYER_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = 'rgba(124,58,237,0.12)';
  ctx.beginPath();
  ctx.ellipse(player.x, PLAYER_Y + PLAYER_R + 4, PLAYER_R * 0.8, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0, H - 4, W, 4);

  ctx.fillStyle = 'rgba(100,255,180,0.55)';
  const barW = Math.min(score * 2.5, W);
  ctx.fillRect(0, H - 4, barW, 4);
}

function endGame() {
  gameOver = true;
  if (score > best) {
    best = score;
    bestDisplay.textContent = best;
  }
  finalScore.textContent = score;
  overlay.classList.remove('hidden');
  drawCrash();
}

function drawCrash() {
  ctx.fillStyle = 'rgba(255,50,50,0.18)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#f87171';
  ctx.shadowColor = '#f87171';
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(player.x, PLAYER_Y, PLAYER_R + 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function loop() {
  if (gameOver) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

startGame();
</script>
</body>
</html>
